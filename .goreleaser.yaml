version: 2

before:
  hooks:
    - cd services/cli && go mod tidy

builds:
  - dir: services/cli
    main: ./cmd/server
    binary: telara
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X gitlab.com/teleraai/telara-cli/services/cli/internal/version.Version={{.Version}}
      - -X gitlab.com/teleraai/telara-cli/services/cli/internal/version.Commit={{.Commit}}
      - -X gitlab.com/teleraai/telara-cli/services/cli/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "telara_checksums.txt"

# GPG signing for Linux release artifacts.
# Set GPG_FINGERPRINT in CI environment before running goreleaser.
signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "-u"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

# TODO: Apple notarization — requires Apple Developer certificate setup in CI.
# TODO: Winget manifest submission to microsoft/winget-pkgs.
# TODO: Scoop bucket autoupdate configuration.

release:
  github:
    owner: Telera-Labs
    name: Telera-CLI

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: telara
    repository:
      owner: Telera-Labs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://telara.ai"
    description: "Telara CLI — manage your MCP configurations"
    install: |
      bin.install "telara"
    test: |
      system "#{bin}/telara version"
