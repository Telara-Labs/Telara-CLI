version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: telara
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X gitlab.com/teleraai/telera-cli/services/cli/internal/version.Version={{.Version}}
      - -X gitlab.com/teleraai/telera-cli/services/cli/internal/version.Commit={{.Commit}}
      - -X gitlab.com/teleraai/telera-cli/services/cli/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "telara_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: telara
    repository:
      owner: telera-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://telara.ai"
    description: "Telara CLI — manage your MCP configurations"
    install: |
      bin.install "telara"
    test: |
      system "#{bin}/telara version"
